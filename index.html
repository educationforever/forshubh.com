<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: arial, sans-serif; background: #fff; color: #202124; min-height: 100vh; }

    /* ── Search Box (shared) ── */
    .search-box {
      display: flex; align-items: center; height: 44px;
      border: 1px solid #dfe1e5; border-radius: 24px;
      padding: 0 14px; gap: 8px; background: #fff;
      transition: box-shadow .2s, border-color .2s;
    }
    .search-box:hover, .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32,33,36,.28);
      border-color: transparent;
    }
    .search-icon { width: 20px; height: 20px; fill: #9aa0a6; flex-shrink: 0; }
    .search-input {
      flex: 1; border: none; outline: none;
      font-size: 16px; color: #202124;
      background: transparent; caret-color: #1a73e8;
    }
    .clear-btn {
      display: none; align-items: center; justify-content: center;
      width: 20px; height: 20px; background: none;
      border: none; cursor: pointer; padding: 0; flex-shrink: 0;
    }
    .clear-btn svg { width: 18px; height: 18px; fill: #70757a; }
    .divider { width: 1px; height: 24px; background: #dfe1e5; flex-shrink: 0; }
    .voice-btn {
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; flex-shrink: 0;
    }

    /* ── Shared Nav ── */
    .signin-btn {
      font-size: 14px; font-weight: 600; color: #fff;
      background: #1a73e8; border: none; border-radius: 4px;
      padding: 9px 23px; cursor: pointer; white-space: nowrap;
    }
    .signin-btn:hover { background: #1558b0; }
    .nav-link { font-size: 13px; color: #202124; text-decoration: none; padding: 6px 8px; }
    .nav-link:hover { text-decoration: underline; }
    .apps-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .apps-btn:hover { background: rgba(60,64,67,.08); }
    .dots-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; width: 18px; height: 18px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: #5f6368; display: block; }

    /* ── HOME PAGE ── */
    #home-page { display: flex; flex-direction: column; min-height: 100vh; }

    .home-header { display: flex; justify-content: flex-end; padding: 8px 20px 0; }
    .home-nav { display: flex; align-items: center; gap: 12px; }

    .home-main { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 92px; }

    .logo-large { width: 272px; height: 92px; margin-bottom: 28px; }

    .search-form-large { width: 100%; max-width: 584px; display: flex; flex-direction: column; align-items: center; }
    .search-form-large .search-box { width: 100%; }

    .search-buttons { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
    .search-btn, .lucky-btn {
      background: #f8f9fa; border: 1px solid #f8f9fa;
      border-radius: 4px; color: #3c4043; cursor: pointer;
      font-size: 14px; padding: 0 16px; height: 36px; white-space: nowrap;
    }
    .search-btn:hover, .lucky-btn:hover { box-shadow: 0 1px 1px rgba(0,0,0,.1); border-color: #dadce0; }

    .lang-row { margin-top: 24px; font-size: 13px; color: #202124; }
    .lang-link { color: #1558d6; text-decoration: none; margin-left: 6px; }
    .lang-link:hover { text-decoration: underline; }

    .g-footer { background: #f2f2f2; border-top: 1px solid #e4e4e4; padding: 15px 30px; }
    .footer-country { font-size: 15px; color: #70757a; padding-bottom: 14px; border-bottom: 1px solid #e4e4e4; margin-bottom: 12px; }
    .footer-links { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .footer-left, .footer-right { display: flex; gap: 20px; flex-wrap: wrap; }
    .footer-link { font-size: 14px; color: #70757a; text-decoration: none; }
    .footer-link:hover { text-decoration: underline; }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; flex-direction: column; min-height: 100vh; }

    .results-header {
      display: flex; align-items: center;
      padding: 10px 24px; border-bottom: 1px solid #ebebeb;
      gap: 20px; position: sticky; top: 0; background: #fff; z-index: 10;
    }
    .results-logo { width: 92px; height: 31px; cursor: pointer; flex-shrink: 0; }

    .search-form-small { flex: 1; max-width: 584px; }
    .search-form-small .search-box { width: 100%; height: 40px; }

    .results-header-right { display: flex; align-items: center; gap: 12px; margin-left: auto; flex-shrink: 0; }

    .results-tabs {
      display: flex; padding: 0 164px;
      border-bottom: 1px solid #ebebeb;
    }
    .tab {
      padding: 10px 16px; font-size: 13px; color: #5f6368;
      cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px;
    }
    .tab:hover { color: #202124; border-bottom-color: #dadce0; }
    .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 500; }

    .results-main { padding: 20px 164px; }

    .results-count { font-size: 13px; color: #70757a; margin-bottom: 20px; }

    /* Spinner */
    .loading-wrap { display: flex; justify-content: center; padding: 60px 0; }
    .g-spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4285f4;
      border-right: 3px solid #ea4335;
      border-bottom: 3px solid #fbbc05;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Direct answer box */
    .answer-box {
      background: #f8f9fa; border: 1px solid #dfe1e5; border-radius: 8px;
      padding: 16px 20px; margin-bottom: 24px; max-width: 620px;
    }
    .answer-label { font-size: 12px; color: #70757a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .answer-text { font-size: 28px; font-weight: 400; color: #202124; line-height: 1.3; }

    /* Knowledge card */
    .knowledge-card {
      border: 1px solid #dfe1e5; border-radius: 8px;
      padding: 20px; margin-bottom: 24px; max-width: 620px;
    }
    .knowledge-heading { font-size: 20px; font-weight: 400; color: #202124; margin-bottom: 10px; }
    .knowledge-text { font-size: 14px; color: #202124; line-height: 1.7; margin-bottom: 10px; }
    .knowledge-source { font-size: 12px; color: #70757a; }
    .knowledge-source a { color: #1a0dab; text-decoration: none; }
    .knowledge-source a:hover { text-decoration: underline; }

    /* Results list — text first, link secondary */
    .results-list { display: flex; flex-direction: column; gap: 0; }
    .result-item {
      max-width: 620px; padding: 16px 0;
      border-bottom: 1px solid #f1f3f4;
    }
    .result-item:last-child { border-bottom: none; }
    .result-body { font-size: 15px; color: #202124; line-height: 1.7; margin-bottom: 8px; }
    .result-source {
      font-size: 12px; color: #70757a;
      display: flex; align-items: center; gap: 6px;
    }
    .source-dot { width: 4px; height: 4px; border-radius: 50%; background: #bdc1c6; flex-shrink: 0; }

    .no-results { padding: 40px 0; }
    .no-results p { font-size: 16px; margin-bottom: 8px; }
    .no-results-hint { font-size: 14px; color: #70757a; }

    /* Responsive */
    @media (max-width: 900px) {
      .results-tabs { padding: 0 16px; }
      .results-main { padding: 20px 16px; }
      .results-header { padding: 10px 16px; }
    }
    @media (max-width: 600px) {
      .home-main { padding-top: 60px; }
      .logo-large { width: 200px; height: 68px; }
      .g-footer { padding: 15px 16px; }
      .results-header-right { display: none; }
    }
  </style>
</head>

<script>
  const homePage    = document.getElementById('home-page');
  const resultsPage = document.getElementById('results-page');
  const homeInput   = document.getElementById('home-input');
  const resultsInput = document.getElementById('results-input');
  const resultsClear = document.getElementById('results-clear');
  const homeClear   = document.getElementById('home-clear');
  const resultsMain = document.getElementById('results-main');

  homeInput.focus();

  document.getElementById('home-form').addEventListener('submit', e => { e.preventDefault(); doSearch(); });
  document.getElementById('results-form').addEventListener('submit', e => { e.preventDefault(); doResultsSearch(); });

  function onHomeInput() {
    homeClear.style.display = homeInput.value ? 'flex' : 'none';
  }

  function clearHome() {
    homeInput.value = '';
    homeClear.style.display = 'none';
    homeInput.focus();
  }

  function onResultsInput() {
    resultsClear.style.display = resultsInput.value ? 'flex' : 'none';
  }

  function clearResults() {
    resultsInput.value = '';
    resultsClear.style.display = 'none';
    resultsInput.focus();
  }

  function goHome() {
    resultsPage.style.display = 'none';
    homePage.style.display = 'flex';
    homeInput.focus();
  }

  function doSearch() {
    const q = homeInput.value.trim();
    if (!q) return;
    showResults(q);
  }

  function doResultsSearch() {
    const q = resultsInput.value.trim();
    if (!q) return;
    showResults(q);
  }

  function showResults(q) {
    homePage.style.display = 'none';
    resultsPage.style.display = 'flex';
    resultsInput.value = q;
    resultsClear.style.display = 'flex';
    resultsMain.innerHTML = '<div class="loading-wrap"><div class="g-spinner"></div></div>';
    fetchDDG(q);
  }

  function fetchDDG(q) {
    const cbName = 'ddgcb_' + Date.now();
    const script = document.createElement('script');
    script.src = 'https://api.duckduckgo.com/?q=' + encodeURIComponent(q) + '&format=json&no_html=1&skip_disambig=1&callback=' + cbName;

    window[cbName] = function(data) {
      delete window[cbName];
      script.remove();
      renderResults(q, data);
    };

    script.onerror = function() {
      delete window[cbName];
      script.remove();
      resultsMain.innerHTML = '<div class="no-results"><p>Could not load results. Check your connection.</p></div>';
    };

    document.head.appendChild(script);
  }

  function renderResults(q, data) {
    const topics = [...(data.Results || []), ...(data.RelatedTopics || [])]
      .filter(function(t) { return t.Text && t.FirstURL; })
      .slice(0, 12);

    let html = '';

    const count = topics.length > 0 ? (topics.length * 1200000).toLocaleString() : '0';
    html += '<p class="results-count">About ' + count + ' results</p>';

    // Direct answer (e.g. "What is 2+2" → "4")
    if (data.Answer) {
      html += '<div class="answer-box">';
      html += '<div class="answer-label">Answer</div>';
      html += '<div class="answer-text">' + escHtml(data.Answer) + '</div>';
      html += '</div>';
    }

    // Abstract / knowledge card — show full text, not just a link
    if (data.AbstractText || data.Abstract) {
      const text = data.AbstractText || data.Abstract;
      html += '<div class="knowledge-card">';
      if (data.Heading) html += '<div class="knowledge-heading">' + escHtml(data.Heading) + '</div>';
      html += '<p class="knowledge-text">' + escHtml(text) + '</p>';
      if (data.AbstractSource && data.AbstractURL) {
        html += '<div class="knowledge-source">From ' + escHtml(data.AbstractSource) + '</div>';
      }
      html += '</div>';
    }

    // Related topics — show the text content directly, link is secondary
    if (topics.length > 0) {
      html += '<div class="results-list">';
      topics.forEach(function(t) {
        let host = '';
        try { host = new URL(t.FirstURL).hostname.replace('www.', ''); } catch(e) {}
        html += '<div class="result-item">';
        html += '<p class="result-body">' + escHtml(t.Text) + '</p>';
        if (host) {
          html += '<div class="result-source">';
          html += '<span class="source-dot"></span>';
          html += '<span>' + escHtml(host) + '</span>';
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    if (!data.Answer && !data.AbstractText && !data.Abstract && topics.length === 0) {
      html += '<div class="no-results"><p>No results found for <strong>' + escHtml(q) + '</strong>.</p><p class="no-results-hint">Try different keywords or check your spelling.</p></div>';
    }

    resultsMain.innerHTML = html;
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
